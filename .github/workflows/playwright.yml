name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - preproduction
          - production
      test_type:
        description: 'Test type to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - regression
          - critical

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  CI: true
  NODE_ENV: test
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the dashboard to the gh-pages branch
      checks: write
      pull-requests: write
    outputs:
      test_result: ${{ steps.test-status.outputs.result }}
      total_tests: ${{ steps.parse-results.outputs.total }}
      passed_tests: ${{ steps.parse-results.outputs.passed }}
      failed_tests: ${{ steps.parse-results.outputs.failed }}
      skipped_tests: ${{ steps.parse-results.outputs.skipped }}
      passed_on_retry: ${{ steps.parse-results.outputs.flaky }}
      retried_tests: ${{ steps.parse-results.outputs.retried }}
      pass_rate: ${{ steps.parse-results.outputs.pass_rate }}
      duration: ${{ steps.parse-results.outputs.duration }}
      environment: ${{ steps.env.outputs.environment }}
      report_url: ${{ steps.report-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Determine environment
        id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "Testing against: $ENV"
      
      - name: Run Playwright tests
        env:
          ENV: ${{ steps.env.outputs.environment }}
          BASE_URL: ${{ secrets[format('BASE_URL_{0}', steps.env.outputs.environment)] }}
          STAGING_MANAGER_EMAIL: ${{ secrets.STAGING_MANAGER_EMAIL }}
          STAGING_MANAGER_PASSWORD: ${{ secrets.STAGING_MANAGER_PASSWORD }}
          STAGING_OPERATOR_EMAIL: ${{ secrets.STAGING_OPERATOR_EMAIL }}
          STAGING_OPERATOR_PASSWORD: ${{ secrets.STAGING_OPERATOR_PASSWORD }}
          PREPRODUCTION_MANAGER_EMAIL: ${{ secrets.PREPRODUCTION_MANAGER_EMAIL }}
          PREPRODUCTION_MANAGER_PASSWORD: ${{ secrets.PREPRODUCTION_MANAGER_PASSWORD }}
          PREPRODUCTION_OPERATOR_EMAIL: ${{ secrets.PREPRODUCTION_OPERATOR_EMAIL }}
          PREPRODUCTION_OPERATOR_PASSWORD: ${{ secrets.PREPRODUCTION_OPERATOR_PASSWORD }}
          PROD_MANAGER_EMAIL: ${{ secrets.PROD_MANAGER_EMAIL }}
          PROD_MANAGER_PASSWORD: ${{ secrets.PROD_MANAGER_PASSWORD }}
          PROD_OPERATOR_EMAIL: ${{ secrets.PROD_OPERATOR_EMAIL }}
          PROD_OPERATOR_PASSWORD: ${{ secrets.PROD_OPERATOR_PASSWORD }}
        run: npx playwright test
      
      - name: Determine test status
        id: test-status
        if: always()
        run: |
          if [ ${{ job.status }} == "success" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi
      
      # Build the custom dashboard (dashboard-report.html + report-summary.json,
      # the single source of truth for the metrics below).
      - name: Generate dashboard report
        if: always()
        run: npx tsx helpers/generate-report.ts || true
        env:
          ENV: ${{ steps.env.outputs.environment }}
          REPORT_TITLE: TMS Rider

      - name: Parse report summary
        id: parse-results
        if: always()
        run: |
          S=report-summary.json
          if [ -f "$S" ]; then
            {
              echo "total=$(jq -r '.total' $S)"
              echo "passed=$(jq -r '.passed' $S)"
              echo "failed=$(jq -r '.failed' $S)"
              echo "skipped=$(jq -r '.skipped' $S)"
              echo "flaky=$(jq -r '.flaky' $S)"
              echo "retried=$(jq -r '.retried' $S)"
              echo "pass_rate=$(jq -r '.passRate' $S)"
              echo "duration=$(jq -r '.duration' $S)"
            } >> "$GITHUB_OUTPUT"
          else
            echo "report-summary.json missing — emitting N/A metrics."
            { echo "total=N/A"; echo "passed=N/A"; echo "failed=N/A"; echo "skipped=N/A"; echo "flaky=N/A"; echo "retried=N/A"; echo "pass_rate=N/A"; echo "duration=N/A"; } >> "$GITHUB_OUTPUT"
          fi

      # Stage the dashboard (+ full Playwright report for drill-down) into a
      # per-run folder so each run gets its own permanent URL and history is kept.
      - name: Stage report for Pages
        id: stage
        if: always()
        run: |
          if [ -f dashboard-report.html ]; then
            mkdir -p public
            cp dashboard-report.html public/index.html
            cp dashboard-report.html public/dashboard-report.html
            [ -d playwright-report ] && cp -r playwright-report public/playwright-report || true
            echo "staged=true" >> "$GITHUB_OUTPUT"
          else
            echo "No dashboard-report.html to publish"
            echo "staged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish report to GitHub Pages
        id: pages
        if: always() && steps.stage.outputs.staged == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: ${{ github.run_id }}
          keep_files: true

      # CTA target: the rendered per-run Pages URL when publishing succeeded,
      # else the Actions run page so the button never dead-links.
      - name: Resolve report URL
        id: report-url
        if: always()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "${{ steps.pages.outcome }}" == "success" ]; then
            OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            REPO="${{ github.event.repository.name }}"
            echo "url=https://${OWNER_LC}.github.io/${REPO}/${{ github.run_id }}/dashboard-report.html" >> "$GITHUB_OUTPUT"
          else
            echo "url=$RUN_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload dashboard report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-${{ steps.env.outputs.environment }}-${{ github.run_number }}
          path: |
            dashboard-report.html
            report-summary.json
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ steps.env.outputs.environment }}
          path: playwright-report/
          retention-days: 30
      
      - name: Upload test results JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-json-${{ steps.env.outputs.environment }}
          path: test-results.json
          retention-days: 30
      
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: results.xml
          check_name: Playwright Test Results
          comment_mode: always
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # Self-contained Slack notification (inline curl — no Node/artifact deps, so it
  # always fires). Rich metrics come from the test job's report-summary outputs;
  # the "View Report Results" CTA opens this run's rendered per-run dashboard.
  notify:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "Slack webhook not configured, skipping notification"
            exit 0
          fi

          RESULT="${{ needs.test.result }}"
          ENV="${{ needs.test.outputs.environment }}"
          TEST_TYPE="${{ github.event.inputs.test_type || 'all' }}"
          TOTAL="${{ needs.test.outputs.total_tests }}"
          PASSED="${{ needs.test.outputs.passed_tests }}"
          FAILED="${{ needs.test.outputs.failed_tests }}"
          SKIPPED="${{ needs.test.outputs.skipped_tests }}"
          ON_RETRY="${{ needs.test.outputs.passed_on_retry }}"
          RETRIED="${{ needs.test.outputs.retried_tests }}"
          PASS_RATE="${{ needs.test.outputs.pass_rate }}"
          DURATION="${{ needs.test.outputs.duration }}"
          REPORT_URL="${{ needs.test.outputs.report_url }}"
          # Fallback so the CTA is always present even if report_url didn't resolve.
          [ -z "$REPORT_URL" ] && REPORT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$RESULT" == "success" ]; then
            EMOJI="✅"; COLOR="#36a64f"; HEADER="TMS Rider — Tests Passed"
          else
            EMOJI="❌"; COLOR="#dc3545"; HEADER="TMS Rider — Tests Failed"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"blocks\": [
                  {\"type\":\"header\",\"text\":{\"type\":\"plain_text\",\"text\":\"$EMOJI $HEADER\",\"emoji\":true}},
                  {\"type\":\"section\",\"fields\":[
                    {\"type\":\"mrkdwn\",\"text\":\"*Environment:*\n$ENV\"},
                    {\"type\":\"mrkdwn\",\"text\":\"*Test Type:*\n$TEST_TYPE\"},
                    {\"type\":\"mrkdwn\",\"text\":\"*Total:*\n$TOTAL\"},
                    {\"type\":\"mrkdwn\",\"text\":\"*Pass Rate:*\n${PASS_RATE}%\"},
                    {\"type\":\"mrkdwn\",\"text\":\"*Passed:*\n$PASSED\"},
                    {\"type\":\"mrkdwn\",\"text\":\"*Failed:*\n$FAILED\"},
                    {\"type\":\"mrkdwn\",\"text\":\"*Skipped:*\n$SKIPPED\"},
                    {\"type\":\"mrkdwn\",\"text\":\"*Passed on Retry:*\n$ON_RETRY\"},
                    {\"type\":\"mrkdwn\",\"text\":\"*Retried:*\n$RETRIED\"},
                    {\"type\":\"mrkdwn\",\"text\":\"*Duration:*\n$DURATION\"}
                  ]},
                  {\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*Branch:* ${{ github.ref_name }}\"}},
                  {\"type\":\"actions\",\"elements\":[{
                    \"type\":\"button\",
                    \"text\":{\"type\":\"plain_text\",\"text\":\"View Report Results\",\"emoji\":true},
                    \"url\":\"$REPORT_URL\"
                  }]}
                ]
              }]
            }"
        continue-on-error: true
