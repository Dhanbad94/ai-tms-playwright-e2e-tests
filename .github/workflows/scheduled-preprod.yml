name: Scheduled Tests - Preproduction

# Schedule:
# - Full suite nightly Mon-Fri at 07:00 UTC (overnight ET: 3 AM EDT / 2 AM EST)

on:
  schedule:
    # Mon-Fri at 07:00 UTC (overnight ET) - full pre-release validation suite
    - cron: '0 7 * * 1-5'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - smoke
          - regression
          - critical
          - all
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ASAPSettings
          - TMSOnboarding

# Prevent a manual run or an overrun from colliding with the scheduled run
# (avoids same-account login session conflicts). Queue rather than cancel.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  ENV: preproduction
  BASE_URL: https://preproduction.trackmyshuttle.com

jobs:
  # Check if secrets are configured
  check-secrets:
    name: Verify Preproduction Secrets
    runs-on: ubuntu-latest
    outputs:
      secrets_configured: ${{ steps.check.outputs.configured }}
      slack_configured: ${{ steps.check.outputs.slack }}
    steps:
      - name: Check if preproduction secrets exist
        id: check
        run: |
          if [ -n "${{ secrets.PREPRODUCTION_MANAGER_EMAIL }}" ] && [ -n "${{ secrets.PREPRODUCTION_MANAGER_PASSWORD }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
            echo " Preproduction secrets are configured"
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo " Preproduction secrets not configured - skipping tests"
          fi

          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "slack=true" >> $GITHUB_OUTPUT
          else
            echo "slack=false" >> $GITHUB_OUTPUT
          fi

  preprod-tests:
    name: Preproduction ${{ github.event.inputs.test_type || 'Full Suite' }} Tests
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.secrets_configured == 'true'
    timeout-minutes: 90
    permissions:
      contents: write        # push the dashboard to the gh-pages branch
    outputs:
      test_type: ${{ steps.test-config.outputs.test_type }}
      test_suite: ${{ steps.test-config.outputs.test_suite }}
      total_tests: ${{ steps.test-result.outputs.total }}
      passed_tests: ${{ steps.test-result.outputs.passed }}
      failed_tests: ${{ steps.test-result.outputs.failed }}
      skipped_tests: ${{ steps.test-result.outputs.skipped }}
      passed_on_retry: ${{ steps.test-result.outputs.flaky }}
      retried_tests: ${{ steps.test-result.outputs.retried }}
      pass_rate: ${{ steps.test-result.outputs.passRate }}
      duration: ${{ steps.test-result.outputs.duration }}
      report_url: ${{ steps.report-url.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env.local from secrets
        run: |
          echo "PREPRODUCTION_MANAGER_EMAIL=${{ secrets.PREPRODUCTION_MANAGER_EMAIL }}" > .env.local
          echo "PREPRODUCTION_MANAGER_PASSWORD=${{ secrets.PREPRODUCTION_MANAGER_PASSWORD }}" >> .env.local
          echo "PREPRODUCTION_OPERATOR_EMAIL=${{ secrets.PREPRODUCTION_OPERATOR_EMAIL }}" >> .env.local
          echo "PREPRODUCTION_OPERATOR_PASSWORD=${{ secrets.PREPRODUCTION_OPERATOR_PASSWORD }}" >> .env.local

      - name: Determine test configuration
        id: test-config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TEST_TYPE="${{ github.event.inputs.test_type }}"
            TEST_SUITE="${{ github.event.inputs.test_suite }}"
          else
            # Scheduled run - full suite
            TEST_TYPE="all"
            TEST_SUITE="all"
          fi

          echo "test_type=$TEST_TYPE" >> $GITHUB_OUTPUT
          echo "test_suite=$TEST_SUITE" >> $GITHUB_OUTPUT
          echo " Test Type: $TEST_TYPE"
          echo " Test Suite: $TEST_SUITE"

      - name: Run Playwright tests
        id: run-tests
        run: |
          TEST_TYPE="${{ steps.test-config.outputs.test_type }}"
          TEST_SUITE="${{ steps.test-config.outputs.test_suite }}"

          CMD="npx playwright test --project=chromium"

          if [ "$TEST_TYPE" != "all" ]; then
            CMD="$CMD --grep @$TEST_TYPE"
          fi

          if [ "$TEST_SUITE" != "all" ]; then
            CMD="$CMD tests/$TEST_SUITE/"
          fi

          echo "Running: $CMD"
          START_TIME=$(date +%s)

          set +e
          eval $CMD
          EXIT_CODE=$?
          set -e

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          exit $EXIT_CODE
        env:
          CI: true
          ENV: preproduction
          BASE_URL: https://preproduction.trackmyshuttle.com

      - name: Generate dashboard report
        if: always()
        run: npx tsx helpers/generate-report.ts || true

      - name: Parse test results
        id: test-result
        if: always()
        run: |
          if [ -f "report-summary.json" ]; then
            for k in total passed failed skipped flaky retried passRate duration; do
              echo "$k=$(jq -r ".$k" report-summary.json)" >> "$GITHUB_OUTPUT"
            done
          else
            for k in total passed failed skipped flaky retried passRate duration; do
              echo "$k=N/A" >> "$GITHUB_OUTPUT"
            done
          fi

      # Stage + publish the dashboard to a per-run gh-pages folder so the Slack
      # "View Report Results" CTA opens this run's rendered report.
      - name: Stage report for Pages
        id: stage
        if: always()
        run: |
          if [ -f dashboard-report.html ]; then
            mkdir -p public
            cp dashboard-report.html public/index.html
            cp dashboard-report.html public/dashboard-report.html
            [ -d playwright-report ] && cp -r playwright-report public/playwright-report || true
            echo "staged=true" >> "$GITHUB_OUTPUT"
          else
            echo "staged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish report to GitHub Pages
        id: pages
        if: always() && steps.stage.outputs.staged == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: ${{ github.run_id }}
          keep_files: true

      - name: Resolve report URL
        id: report-url
        if: always()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "${{ steps.pages.outcome }}" == "success" ]; then
            OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            REPO="${{ github.event.repository.name }}"
            echo "url=https://${OWNER_LC}.github.io/${REPO}/${{ github.run_id }}/dashboard-report.html" >> "$GITHUB_OUTPUT"
          else
            echo "url=$RUN_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preprod-report-${{ steps.test-config.outputs.test_type }}-${{ github.run_number }}
          path: |
            playwright-report/
            dashboard-report.html
            report-summary.json
          retention-days: 30

      - name: Upload failure artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: preprod-failures-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  # Unified notification job
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [check-secrets, preprod-tests]
    if: always() && needs.check-secrets.outputs.secrets_configured == 'true' && needs.check-secrets.outputs.slack_configured == 'true'
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          RESULT="${{ needs.preprod-tests.result }}"
          # CTA target: the rendered per-run dashboard, else the CI run.
          REPORT_URL="${{ needs.preprod-tests.outputs.report_url }}"
          [ -z "$REPORT_URL" ] && REPORT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEST_TYPE="${{ needs.preprod-tests.outputs.test_type }}"
          TOTAL="${{ needs.preprod-tests.outputs.total_tests }}"
          PASSED="${{ needs.preprod-tests.outputs.passed_tests }}"
          FAILED="${{ needs.preprod-tests.outputs.failed_tests }}"
          SKIPPED="${{ needs.preprod-tests.outputs.skipped_tests }}"
          ON_RETRY="${{ needs.preprod-tests.outputs.passed_on_retry }}"
          RETRIED="${{ needs.preprod-tests.outputs.retried_tests }}"
          PASS_RATE="${{ needs.preprod-tests.outputs.pass_rate }}"
          DURATION="${{ needs.preprod-tests.outputs.duration }}"

          if [ "$RESULT" == "success" ]; then
            EMOJI=" "
            COLOR="#36a64f"
            HEADER="Preproduction Tests Passed"
            EXTRA_MSG=""
          else
            EMOJI=" "
            COLOR="#ff9800"
            HEADER="Preproduction Tests Failed"
            EXTRA_MSG="\n\n *Action Required:* Review failures before release!"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"attachments\": [
                {
                  \"color\": \"$COLOR\",
                  \"blocks\": [
                    {
                      \"type\": \"header\",
                      \"text\": {
                        \"type\": \"plain_text\",
                        \"text\": \"$EMOJI $HEADER\",
                        \"emoji\": true
                      }
                    },
                    {
                      \"type\": \"section\",
                      \"fields\": [
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Environment:*\nPreproduction\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Test Type:*\n${TEST_TYPE}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Total Tests:*\n${TOTAL}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Pass Rate:*\n${PASS_RATE}%\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Passed:*\n${PASSED}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Failed:*\n${FAILED}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Skipped:*\n${SKIPPED}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Passed on Retry:*\n${ON_RETRY}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Retried:*\n${RETRIED}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Duration:*\n${DURATION}\"
                        }
                      ]
                    },
                    {
                      \"type\": \"section\",
                      \"text\": {
                        \"type\": \"mrkdwn\",
                        \"text\": \"*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}${EXTRA_MSG}\"
                      }
                    },
                    {
                      \"type\": \"actions\",
                      \"elements\": [
                        {
                          \"type\": \"button\",
                          \"text\": {
                            \"type\": \"plain_text\",
                            \"text\": \"View Report Results\",
                            \"emoji\": true
                          },
                          \"url\": \"$REPORT_URL\"
                        }
                      ]
                    }
                  ]
                }
              ]
            }" \
            $SLACK_WEBHOOK_URL
        continue-on-error: true

  # Skip notification
  notify-skipped:
    name: Notify Skipped
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.secrets_configured == 'false'
    steps:
      - name: Log skip reason
        run: |
          echo " Preproduction tests skipped - secrets not configured"
          echo "To enable, add these GitHub Secrets:"
          echo "  - PREPRODUCTION_MANAGER_EMAIL"
          echo "  - PREPRODUCTION_MANAGER_PASSWORD"
          echo "  - PREPRODUCTION_OPERATOR_EMAIL"
          echo "  - PREPRODUCTION_OPERATOR_PASSWORD"