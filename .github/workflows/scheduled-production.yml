name: Scheduled Tests - Production

# Schedule:
# - Daily read-only @prod health check at 05:00 UTC (overnight ET: 1 AM EDT / 12 AM EST)

# ⚠️ PRODUCTION SAFETY NOTES:
# - Only read-only @prod-tagged tests run (enforced via --grep @prod below)
# - Avoid CRUD operations that modify production data
# - Tests should be non-destructive
# - Failures trigger critical alerts

on:
  schedule:
    # Daily at 05:00 UTC (overnight ET) - read-only @prod health check
    - cron: '0 5 * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - critical
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ASAPSettings
          - TMSOnboarding
      confirm_production:
        description: 'Type "CONFIRM" to run on production'
        required: true
        default: ''
        type: string

# Prevent a manual run or an overrun from colliding with the scheduled run
# (avoids same-account login session conflicts). Queue rather than cancel prod.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  ENV: production
  BASE_URL: https://trackmyshuttle.com

jobs:
  # Check if secrets are configured
  check-secrets:
    name: Verify Production Secrets
    runs-on: ubuntu-latest
    outputs:
      secrets_configured: ${{ steps.check.outputs.configured }}
      slack_configured: ${{ steps.check.outputs.slack }}
    steps:
      - name: Check if production secrets exist
        id: check
        run: |
          if [ -n "${{ secrets.PROD_MANAGER_EMAIL }}" ] && [ -n "${{ secrets.PROD_MANAGER_PASSWORD }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "✅ Production secrets are configured"
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ Production secrets not configured - skipping tests"
          fi

          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "slack=true" >> $GITHUB_OUTPUT
          else
            echo "slack=false" >> $GITHUB_OUTPUT
          fi

  # Safety check for manual runs
  safety-check:
    name: Production Safety Check
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.secrets_configured == 'true'
    outputs:
      proceed: ${{ steps.verify.outputs.proceed }}
    steps:
      - name: Verify manual trigger confirmation
        id: verify
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.confirm_production }}" != "CONFIRM" ]; then
              echo "❌ Manual production runs require confirmation"
              echo "Please type 'CONFIRM' in the confirmation field"
              echo "proceed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "proceed=true" >> $GITHUB_OUTPUT
          echo "✅ Safety check passed"

  production-tests:
    name: Production ${{ github.event.inputs.test_type || 'Scheduled' }} Tests
    runs-on: ubuntu-latest
    needs: [check-secrets, safety-check]
    if: |
      needs.check-secrets.outputs.secrets_configured == 'true' &&
      needs.safety-check.outputs.proceed == 'true'
    timeout-minutes: 45
    permissions:
      contents: write        # push the dashboard to the gh-pages branch
    outputs:
      test_type: ${{ steps.test-config.outputs.test_type }}
      test_suite: ${{ steps.test-config.outputs.test_suite }}
      total_tests: ${{ steps.test-result.outputs.total }}
      passed_tests: ${{ steps.test-result.outputs.passed }}
      failed_tests: ${{ steps.test-result.outputs.failed }}
      skipped_tests: ${{ steps.test-result.outputs.skipped }}
      passed_on_retry: ${{ steps.test-result.outputs.flaky }}
      retried_tests: ${{ steps.test-result.outputs.retried }}
      pass_rate: ${{ steps.test-result.outputs.passRate }}
      duration: ${{ steps.test-result.outputs.duration }}
      report_url: ${{ steps.report-url.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env.local from secrets
        run: |
          echo "PROD_MANAGER_EMAIL=${{ secrets.PROD_MANAGER_EMAIL }}" > .env.local
          echo "PROD_MANAGER_PASSWORD=${{ secrets.PROD_MANAGER_PASSWORD }}" >> .env.local
          echo "PROD_OPERATOR_EMAIL=${{ secrets.PROD_OPERATOR_EMAIL }}" >> .env.local
          echo "PROD_OPERATOR_PASSWORD=${{ secrets.PROD_OPERATOR_PASSWORD }}" >> .env.local

      - name: Determine test configuration
        id: test-config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TEST_TYPE="${{ github.event.inputs.test_type }}"
            TEST_SUITE="${{ github.event.inputs.test_suite }}"
          else
            # Scheduled daily run: read-only production health check.
            # (Execution is always restricted to @prod tests; this is just a label.)
            TEST_TYPE="health-check"
            TEST_SUITE="all"
          fi

          echo "test_type=$TEST_TYPE" >> $GITHUB_OUTPUT
          echo "test_suite=$TEST_SUITE" >> $GITHUB_OUTPUT
          echo "🚨 PRODUCTION Environment"
          echo "📋 Test Type: $TEST_TYPE"
          echo "📁 Test Suite: $TEST_SUITE"

      - name: Run Playwright tests
        id: run-tests
        run: |
          TEST_TYPE="${{ steps.test-config.outputs.test_type }}"
          TEST_SUITE="${{ steps.test-config.outputs.test_suite }}"

          CMD="npx playwright test --project=chromium"

          # PRODUCTION SAFETY: only ever run read-only @prod-tagged tests, regardless
          # of the requested test type, so no CRUD/data-mutating test touches prod.
          CMD="$CMD --grep @prod"

          if [ "$TEST_SUITE" != "all" ]; then
            CMD="$CMD tests/$TEST_SUITE/"
          fi

          echo "🚨 Running on PRODUCTION (read-only @prod only): $CMD"
          START_TIME=$(date +%s)

          set +e
          eval $CMD
          EXIT_CODE=$?
          set -e

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          exit $EXIT_CODE
        env:
          CI: true
          ENV: production
          BASE_URL: https://trackmyshuttle.com

      - name: Generate dashboard report
        if: always()
        run: npx tsx helpers/generate-report.ts || true

      - name: Parse test results
        id: test-result
        if: always()
        run: |
          if [ -f "report-summary.json" ]; then
            for k in total passed failed skipped flaky retried passRate duration; do
              echo "$k=$(jq -r ".$k" report-summary.json)" >> "$GITHUB_OUTPUT"
            done
          else
            for k in total passed failed skipped flaky retried passRate duration; do
              echo "$k=N/A" >> "$GITHUB_OUTPUT"
            done
          fi

      # Stage + publish the dashboard to a per-run gh-pages folder so the Slack
      # "View Report Results" CTA opens this run's rendered report.
      - name: Stage report for Pages
        id: stage
        if: always()
        run: |
          if [ -f dashboard-report.html ]; then
            mkdir -p public
            cp dashboard-report.html public/index.html
            cp dashboard-report.html public/dashboard-report.html
            [ -d playwright-report ] && cp -r playwright-report public/playwright-report || true
            echo "staged=true" >> "$GITHUB_OUTPUT"
          else
            echo "staged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish report to GitHub Pages
        id: pages
        if: always() && steps.stage.outputs.staged == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: ${{ github.run_id }}
          keep_files: true

      - name: Resolve report URL
        id: report-url
        if: always()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "${{ steps.pages.outcome }}" == "success" ]; then
            OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            REPO="${{ github.event.repository.name }}"
            echo "url=https://${OWNER_LC}.github.io/${REPO}/${{ github.run_id }}/dashboard-report.html" >> "$GITHUB_OUTPUT"
          else
            echo "url=$RUN_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-report-${{ steps.test-config.outputs.test_type }}-${{ github.run_number }}
          path: |
            playwright-report/
            dashboard-report.html
            report-summary.json
          retention-days: 30

      - name: Upload failure artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: production-failures-${{ github.run_number }}
          path: test-results/
          retention-days: 14

  # Unified notification job for production
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [check-secrets, safety-check, production-tests]
    if: always() && needs.check-secrets.outputs.secrets_configured == 'true' && needs.safety-check.outputs.proceed == 'true' && needs.check-secrets.outputs.slack_configured == 'true'
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          RESULT="${{ needs.production-tests.result }}"
          # CTA target: the rendered per-run dashboard, else the CI run.
          REPORT_URL="${{ needs.production-tests.outputs.report_url }}"
          [ -z "$REPORT_URL" ] && REPORT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEST_TYPE="${{ needs.production-tests.outputs.test_type }}"
          TOTAL="${{ needs.production-tests.outputs.total_tests }}"
          PASSED="${{ needs.production-tests.outputs.passed_tests }}"
          FAILED="${{ needs.production-tests.outputs.failed_tests }}"
          SKIPPED="${{ needs.production-tests.outputs.skipped_tests }}"
          ON_RETRY="${{ needs.production-tests.outputs.passed_on_retry }}"
          RETRIED="${{ needs.production-tests.outputs.retried_tests }}"
          PASS_RATE="${{ needs.production-tests.outputs.pass_rate }}"
          DURATION="${{ needs.production-tests.outputs.duration }}"

          if [ "$RESULT" == "success" ]; then
            EMOJI="✅"
            COLOR="#36a64f"
            HEADER="Production Tests Passed"
            EXTRA_MSG="\n\n✅ Production health check OK!"
          else
            EMOJI="🚨"
            COLOR="#dc3545"
            HEADER="CRITICAL: Production Tests Failed"
            EXTRA_MSG="\n\n🚨 *IMMEDIATE ATTENTION REQUIRED!*"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"attachments\": [
                {
                  \"color\": \"$COLOR\",
                  \"blocks\": [
                    {
                      \"type\": \"header\",
                      \"text\": {
                        \"type\": \"plain_text\",
                        \"text\": \"$EMOJI $HEADER\",
                        \"emoji\": true
                      }
                    },
                    {
                      \"type\": \"section\",
                      \"fields\": [
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Environment:*\n🚨 PRODUCTION\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Test Type:*\n${TEST_TYPE}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Total Tests:*\n${TOTAL}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Pass Rate:*\n${PASS_RATE}%\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Passed:*\n${PASSED}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Failed:*\n${FAILED}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Skipped:*\n${SKIPPED}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Passed on Retry:*\n${ON_RETRY}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Retried:*\n${RETRIED}\"
                        },
                        {
                          \"type\": \"mrkdwn\",
                          \"text\": \"*Duration:*\n${DURATION}\"
                        }
                      ]
                    },
                    {
                      \"type\": \"section\",
                      \"text\": {
                        \"type\": \"mrkdwn\",
                        \"text\": \"*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}${EXTRA_MSG}\"
                      }
                    },
                    {
                      \"type\": \"actions\",
                      \"elements\": [
                        {
                          \"type\": \"button\",
                          \"text\": {
                            \"type\": \"plain_text\",
                            \"text\": \"View Report Results\",
                            \"emoji\": true
                          },
                          \"url\": \"$REPORT_URL\"
                        }
                      ]
                    }
                  ]
                }
              ]
            }" \
            $SLACK_WEBHOOK_URL
        continue-on-error: true

  # Skip notification when secrets not configured
  notify-skipped:
    name: Notify Skipped
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.secrets_configured == 'false'
    steps:
      - name: Log skip reason
        run: |
          echo "⏭️ Production tests skipped - secrets not configured"
          echo "To enable, add these GitHub Secrets:"
          echo "  - PROD_MANAGER_EMAIL"
          echo "  - PROD_MANAGER_PASSWORD"
          echo "  - PROD_OPERATOR_EMAIL"
          echo "  - PROD_OPERATOR_PASSWORD"